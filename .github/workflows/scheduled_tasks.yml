name: 定时任务

on:
  schedule:
    # 飞龙在天 — 北京时间 8:00 (UTC 0:00)
    - cron: '0 0 * * 1-5'
    # 缠论分析 — 北京时间 8:30 (UTC 0:30)
    - cron: '30 0 * * 1-5'
    # 大盘复盘 — 北京时间 16:30 (UTC 8:30)
    - cron: '30 8 * * 1-5'
    # 一阳指 — 北京时间 12:30 (UTC 4:30)
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

concurrency:
  group: scheduled-tasks
  cancel-in-progress: false

jobs:
  flying-dragon:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1-5'
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安装依赖
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: 创建必要目录
        run: mkdir -p data logs reports
      - name: 执行飞龙在天选股
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          DINGTALK_WEBHOOK_SECRET: ${{ secrets.DINGTALK_WEBHOOK_SECRET }}
          LOG_LEVEL: INFO
        run: python main.py --flying-dragon --force-run

  chan-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 0 * * 1-5'
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安装依赖
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: 创建必要目录
        run: mkdir -p data logs reports
      - name: 执行缠论分析
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          DINGTALK_WEBHOOK_SECRET: ${{ secrets.DINGTALK_WEBHOOK_SECRET }}
          LOG_LEVEL: INFO
        run: python main.py --chan-review --force-run

  market-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 8 * * 1-5'
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安装依赖
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: 创建必要目录
        run: mkdir -p data logs reports
      - name: 执行大盘复盘
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          DINGTALK_WEBHOOK_SECRET: ${{ secrets.DINGTALK_WEBHOOK_SECRET }}
          LOG_LEVEL: INFO
        run: python main.py --market-review --force-run

  one-finger:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 4 * * 1-5'
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安装依赖
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: 创建必要目录
        run: mkdir -p data logs reports
      - name: 执行午盘一阳指战法选股
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          DINGTALK_WEBHOOK_SECRET: ${{ secrets.DINGTALK_WEBHOOK_SECRET }}
          LOG_LEVEL: INFO
        run: python main.py --one-finger --force-run
